<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タイムカード">
<meta name="theme-color" content="#0B1842">
<title>タイムカード</title>
<link rel="manifest" href="staff-manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --cosmos: #0B1842;
    --cosmos-mid: #172654;
    --cosmos-light: #1e3270;
    --accent: #4A90D9;
    --gold: #F5C842;
    --green: #2ECC71;
    --green-glow: rgba(46,204,113,0.3);
    --red: #E74C3C;
    --red-glow: rgba(231,76,60,0.3);
    --orange: #E67E22;
    --text: #E8EDF5;
    --text-muted: rgba(232,237,245,0.55);
    --card: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--cosmos);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(74,144,217,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(245,200,66,0.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  #app { position: relative; z-index: 1; min-height: 100%; display: flex; flex-direction: column; }

  /* ローディング */
  #loading-screen {
    position: fixed; inset: 0; background: var(--cosmos);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 999; transition: opacity 0.4s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-size: 48px; animation: pulse 1.5s ease-in-out infinite; }
  .loading-text { color: var(--text-muted); font-size: 14px; }
  @keyframes pulse { 0%,100%{opacity:0.5;transform:scale(0.95)} 50%{opacity:1;transform:scale(1)} }

  /* エラー */
  #error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; text-align: center; gap: 16px; }
  #error-screen.show { display: flex; }
  .error-icon { font-size: 48px; }
  .error-title { font-size: 18px; font-weight: 700; color: var(--red); }
  .error-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; white-space: pre-line; }

  /* メイン */
  #main-screen { display: none; flex-direction: column; flex: 1; }
  #main-screen.show { display: flex; }

  /* ヘッダー */
  .header {
    padding: 20px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--card-border);
  }
  .header-store { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }
  .header-name { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .header-time { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; text-align: right; }
  .header-date-str { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 1px; }

  /* スクロール */
  .scroll-area {
    flex: 1; overflow-y: auto; padding: 20px 16px 40px;
    display: flex; flex-direction: column; gap: 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* バナー */
  #banner {
    position: fixed; top: -80px; left: 16px; right: 16px;
    background: var(--cosmos-light); border: 1px solid var(--accent);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 14px; font-weight: 600; text-align: center;
    z-index: 100; transition: top 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #banner.show { top: 16px; }

  /* ────── 打刻エリアカード ────── */
  .clockin-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  /* ステータスバッジ */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
  }
  .status-badge.active { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: var(--green); }
  .status-badge.inactive { background: rgba(255,255,255,0.06); border: 1px solid var(--card-border); color: var(--text-muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .status-badge.active .status-dot { animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ci-info { font-size: 13px; color: var(--text-muted); }
  .ci-time { color: var(--green); font-weight: 600; }

  /* 現在時刻大表示 */
  .current-time-display { text-align: center; }
  .current-time-big {
    font-size: 64px; font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }
  .current-time-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.08em; }

  /* 打刻ボタン */
  .punch-btn {
    width: 140px; height: 140px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    font-family: inherit; transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-appearance: none; outline: none; user-select: none;
  }
  .punch-btn:active { transform: scale(0.93); }
  .clockin-btn {
    background: linear-gradient(145deg, var(--green), #27AE60);
    box-shadow: 0 0 40px var(--green-glow), 0 8px 24px rgba(0,0,0,0.3);
  }
  .clockout-btn {
    background: linear-gradient(145deg, var(--orange), var(--red));
    box-shadow: 0 0 40px var(--red-glow), 0 8px 24px rgba(0,0,0,0.3);
  }
  .punch-btn-icon { font-size: 32px; }
  .punch-btn-label { font-size: 15px; font-weight: 700; letter-spacing: 0.06em; color: #fff; }
  @keyframes ripple {
    0% { transform: scale(0.93); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); box-shadow: 0 0 0 40px rgba(255,255,255,0); }
  }
  .punch-btn.punching { animation: ripple 0.5s ease forwards; }

  /* 時刻変更トリガー */
  .time-edit-trigger {
    background: none; border: 1px solid var(--card-border);
    border-radius: 100px; padding: 7px 18px;
    font-size: 12px; color: var(--text-muted); font-family: inherit;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .time-edit-trigger:active { border-color: var(--accent); color: var(--accent); }

  /* 時刻編集パネル */
  .time-edit-panel {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border); border-radius: var(--radius-sm);
    padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .time-edit-title { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; }
  .time-spinner-row { display: flex; align-items: center; gap: 8px; }
  .time-spinner-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .spin-btn {
    width: 48px; height: 36px; background: rgba(255,255,255,0.08);
    border: 1px solid var(--card-border); border-radius: 8px;
    color: var(--text); font-size: 16px; cursor: pointer;
    font-family: inherit; transition: background 0.1s;
  }
  .spin-btn:active { background: rgba(255,255,255,0.15); }
  .spin-val {
    font-size: 48px; font-weight: 200; font-variant-numeric: tabular-nums;
    min-width: 72px; text-align: center; line-height: 1;
  }
  .time-colon { font-size: 40px; font-weight: 200; color: var(--text-muted); padding-bottom: 8px; }
  .time-edit-hint { font-size: 11px; color: var(--text-muted); }
  .time-edit-actions { display: flex; gap: 10px; width: 100%; }
  .time-cancel-btn {
    flex: 1; padding: 12px; background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border); border-radius: var(--radius-sm);
    color: var(--text-muted); font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .time-confirm-btn {
    flex: 2; padding: 12px; background: var(--accent);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
  }
  .time-confirm-btn:active { opacity: 0.85; }

  /* 退勤済み完了表示 */
  .done-display { text-align: center; padding: 8px 0; }
  .done-icon { font-size: 40px; margin-bottom: 8px; }
  .done-times { font-size: 20px; font-weight: 300; font-variant-numeric: tabular-nums; color: var(--text); }
  .done-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* セクション */
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }

  /* 在店状況 */
  .today-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
  .today-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
  .staff-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--card-border); }
  .staff-row:last-child { border-bottom: none; }
  .staff-row.self-row { background: rgba(74,144,217,0.08); }
  .staff-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--cosmos-light); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .staff-row.active-row .staff-avatar { background: rgba(46,204,113,0.2); border: 1px solid rgba(46,204,113,0.5); }
  .staff-info { flex: 1; min-width: 0; }
  .staff-name-text { font-size: 14px; font-weight: 600; }
  .self-label { font-size: 10px; color: var(--accent); font-weight: 600; }
  .staff-status-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; flex-shrink: 0; }
  .staff-status-tag.in { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
  .staff-status-tag.out { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--card-border); }

  /* 当月勤怠 */
  .monthly-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
  .monthly-header { padding: 12px 16px; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; }
  .monthly-title-text { font-size: 13px; font-weight: 700; }
  .monthly-count { font-size: 12px; color: var(--text-muted); }
  .monthly-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
  .monthly-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--card-border); gap: 12px; }
  .monthly-row:last-child { border-bottom: none; }
  .monthly-date-col { width: 52px; flex-shrink: 0; }
  .monthly-date-day { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .monthly-date-wd { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .monthly-times { flex: 1; }
  .monthly-time-row { font-size: 13px; font-variant-numeric: tabular-nums; }
  .monthly-time-row .sep { color: var(--text-muted); margin: 0 4px; }
  .monthly-time-active { font-size: 11px; color: var(--green); margin-top: 1px; }
  .monthly-duration { font-size: 12px; color: var(--text-muted); text-align: right; flex-shrink: 0; }
  .ci-pin { color: var(--gold); font-weight: 600; }

  /* 段2 QR現地証明バッジ（未出勤時の案内） */
  .qr-pin-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 100px;
    background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.4);
    color: var(--gold); font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  }

  /* QRカメラオーバーレイ（in-appカメラ・getUserMedia + BarcodeDetector）*/
  #qr-overlay { position: fixed; inset: 0; background: #000; z-index: 500; display: none; }
  #qr-overlay.show { display: block; }
  #qr-video { width: 100%; height: 100%; object-fit: cover; }
  .qr-frame {
    position: absolute; top: 44%; left: 50%; transform: translate(-50%,-50%);
    width: 240px; height: 240px; border: 3px solid var(--gold); border-radius: 18px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  .qr-hint {
    position: absolute; bottom: 104px; left: 0; right: 0; text-align: center;
    color: #fff; font-size: 14px; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  .qr-cancel {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    padding: 13px 30px; background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.4); border-radius: 100px;
    color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .qr-cancel:active { background: rgba(255,255,255,0.28); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">⏱️</div>
  <div class="loading-text">読み込み中...</div>
</div>

<div id="error-screen">
  <div class="error-icon">🔐</div>
  <div class="error-title" id="error-title">スタッフ認証エラー</div>
  <div class="error-msg" id="error-msg">URLが正しくありません。</div>
</div>

<div id="banner"></div>

<div id="app">
  <div id="main-screen">
    <div class="header">
      <div>
        <div class="header-store" id="header-store">ULTRA ZAIMU</div>
        <div class="header-name" id="header-name">－</div>
      </div>
      <div>
        <div class="header-time" id="header-time">--:--</div>
        <div class="header-date-str" id="header-date">－</div>
      </div>
    </div>

    <div class="scroll-area">

      <!-- 打刻カード（JS側で中身をレンダリング）-->
      <div class="clockin-card" id="punch-area">
        <div class="loading-text">読み込み中...</div>
      </div>

      <!-- 当月勤怠 -->
      <div>
        <div class="section-title">今月の出勤記録</div>
        <div class="monthly-card">
          <div class="monthly-header">
            <div class="monthly-title-text" id="monthly-title-text">今月</div>
            <div class="monthly-count" id="monthly-count">0日</div>
          </div>
          <div id="monthly-list"><div class="monthly-empty">記録がありません</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 段2 QR現地証明：in-appカメラオーバーレイ -->
<div id="qr-overlay">
  <video id="qr-video" playsinline muted></video>
  <div class="qr-frame"></div>
  <div class="qr-hint" id="qr-hint">店舗のQRコードを枠内に写してください</div>
  <button class="qr-cancel" id="qr-cancel">QRなしで打刻</button>
</div>

<script src="js/staff-clockin.js"></script>
</body>
</html>
