<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>設定 — ウルトラZAIMUくん</title>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/forms.css">
  <style>
    /* ══════════════════════════════════════════════════════════
       設定画面 レイアウト
       スマホ：page-wrapper をスクロール（base.css の bottom padding を活かす）
       iPad ：is-ipad クラスで中央寄せ・アコーディオン（settings.js 制御）
       ══════════════════════════════════════════════════════════ */
    .settings-header {
      padding: 16px 16px 8px;
      background: var(--uz-bg, #fff);
    }
    .settings-header__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--uz-text);
    }

    .settings-section {
      background: var(--uz-surface);
      border: 1px solid var(--uz-border);
      border-radius: 12px;
      margin: 12px 16px;
      overflow: hidden;
    }
    .settings-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 16px;
      background: none;
      border: none;
      font-family: var(--font-main);
      cursor: default;
      text-align: left;
    }
    .settings-section__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--uz-text);
    }
    .settings-count-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--uz-muted);
    }
    .settings-section__body {
      padding: 0 0 8px;
    }

    /* ── 行（スタッフ／サービス／仕入 共通） ── */
    .staff-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--uz-border);
    }
    .staff-row:first-child { border-top: none; }
    .staff-row__name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--uz-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 雇用形態バッジ ── */
    .staff-emp-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .staff-emp-badge--employed {
      background: rgba(59,130,246,0.12);
      color: #3b82f6;
    }
    .staff-emp-badge--contractor {
      background: rgba(229,185,57,0.16);
      color: #b8860b;
    }

    /* ── 税率バッジ ── */
    .service-tax-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,0,0,0.05);
      color: var(--uz-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── ボタン（編集／保存／削除／キャンセル） ── */
    .staff-edit-btn,
    .staff-save-btn,
    .staff-delete-btn,
    .staff-cancel-btn {
      font-size: 11px;
      padding: 4px 12px;
      line-height: 1.4;
      border-radius: 20px;
      border: 0.5px solid var(--uz-border2);
      cursor: pointer;
      font-family: var(--font-main);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .staff-edit-btn { background: var(--uz-amber-bg); color: var(--uz-text); }
    .staff-save-btn { background: var(--uz-text); color: #fff; border-color: var(--uz-text); }
    .staff-delete-btn { background: var(--uz-red-bg); color: var(--uz-red); border-color: rgba(224,80,80,0.3); }
    .staff-cancel-btn { background: none; color: var(--uz-muted); }

    /* ── スタッフ編集モード（2段組） ── */
    .staff-row--editing { display: block; padding: 12px 16px; }
    .staff-edit { display: flex; flex-direction: column; gap: 8px; }
    .staff-edit__line { display: flex; align-items: center; gap: 8px; }
    .staff-edit__name { flex: 1; min-width: 0; }
    .staff-edit__emp { width: 150px; flex-shrink: 0; }
    .staff-edit__cost { width: 150px; flex-shrink: 0; }
    .staff-edit__pw { flex: 1; min-width: 0; }
    .staff-edit__actions { gap: 8px; }
    .staff-edit__spacer { flex: 1; }

    /* ── 追加フォーム行 ── */
    .settings-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-top: 1px solid var(--uz-border);
    }
    .settings-input {
      flex: 1;
      min-width: 120px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--uz-border2);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-main);
      background: var(--uz-bg, #fff);
      color: var(--uz-text);
      box-sizing: border-box;
    }
    .settings-add-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      border: none;
      background: var(--uz-text);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      flex-shrink: 0;
    }
    .settings-save-btn {
      display: block;
      margin: 12px 16px 4px;
      padding: 12px 16px;
      width: calc(100% - 32px);
      border-radius: 10px;
      border: none;
      background: var(--uz-text);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
    }
    .settings-note {
      font-size: 12px;
      color: var(--uz-muted);
      line-height: 1.6;
      padding: 6px 16px 4px;
    }

    /* ── 基本情報（読み取り専用） ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid var(--uz-border);
    }
    .info-row:first-child { border-top: none; }
    .info-row__key { color: var(--uz-muted); font-size: 13px; }
    .info-row__val { font-weight: 700; font-size: 14px; text-align: right; }
    .info-row__url { font-size: 11px; color: var(--uz-muted); word-break: break-all; }

    /* ── フォーム select（共通流用） ── */
    .form-select {
      height: 40px;
      padding: 0 8px;
      border: 1px solid var(--uz-border2);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-main);
      background: var(--uz-bg, #fff);
      color: var(--uz-text);
    }

    .settings-footer {
      text-align: center;
      color: var(--uz-muted);
      font-size: 12px;
      padding: 16px 0 24px;
    }

    /* ── iPad：ホーム/月次管理と同じくサイドバー幅分を右オフセット（縦型でも隠れない）。
       本体内で各カードを読みやすい幅に中央寄せ。 ── */
    body.is-ipad .page-wrapper {
      max-width: none;
      margin-left: 200px;
      margin-right: 0;
      width: calc(100% - 200px);
    }
    body.is-ipad .settings-header,
    body.is-ipad .settings-section,
    body.is-ipad .settings-save-btn,
    body.is-ipad .settings-note,
    body.is-ipad .settings-footer {
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
</head>
<body data-page="settings">

<!-- iPad サイドバーナビ（スマホでは非表示／中身は app.js uzRenderSidebar が生成） -->
<nav class="nav-sidebar" id="nav-sidebar" data-active="settings" aria-label="メインナビゲーション"></nav>

<div class="page-wrapper">

  <!-- ページヘッダー -->
  <header class="settings-header">
    <span class="settings-header__title">設定</span>
  </header>

  <!-- ① スタッフマスタ -->
  <section class="settings-section">
    <button class="settings-section__head" type="button"
            aria-controls="sec-staff-body" aria-expanded="true">
      <span class="settings-section__title">スタッフマスタ</span>
    </button>
    <div class="settings-section__body" id="sec-staff-body">
      <div id="staff-list-container"></div>
      <div class="settings-add-row">
        <input type="text" id="staff-add-input" class="settings-input"
               placeholder="スタッフ名" maxlength="20" autocomplete="off">
        <select id="staff-add-emp" class="form-select" style="flex-shrink:0;">
          <option value="employed_full">常勤雇用（社員）</option>
          <option value="employed_temp">臨時アルバイト</option>
          <option value="contractor">委託・外注</option>
        </select>
        <select id="staff-add-cost" class="form-select" style="flex-shrink:0;" disabled>
          <option value="21">21：外注工賃</option>
          <option value="25">25：税理士等の報酬</option>
        </select>
        <input type="text" id="staff-add-password" class="settings-input"
               placeholder="パスワード（5桁英数字）" maxlength="5" autocomplete="off">
        <button id="staff-add-btn" class="settings-add-btn" type="button">＋ 追加</button>
      </div>
      <p class="settings-note">
        氏名・雇用形態・コスト科目（委託・外注時）・パスワードを設定できます。給与単価・源泉区分はPC版の出勤管理で設定します。
      </p>
    </div>
  </section>

  <!-- ② サービスマスタ（売上区分） -->
  <section class="settings-section">
    <button class="settings-section__head" type="button"
            aria-controls="sec-service-body" aria-expanded="true">
      <span class="settings-section__title">サービスマスタ（売上区分）
        <span id="service-count-badge" class="settings-count-badge" hidden></span>
      </span>
    </button>
    <div class="settings-section__body" id="sec-service-body">
      <div id="service-list-container"></div>
      <div id="service-add-row" class="settings-add-row">
        <input type="text" id="service-add-name" class="settings-input"
               placeholder="サービス名（例：店内売上）" maxlength="30" autocomplete="off">
        <select id="service-add-tax" class="form-select" style="width:120px;flex-shrink:0;">
          <option value="10">10%</option>
          <option value="8">8%（軽減）</option>
          <option value="0">0%（非課税）</option>
        </select>
        <button id="service-add-btn" class="settings-add-btn" type="button">＋ 追加</button>
      </div>
      <p id="service-limit-hint" class="settings-note" hidden></p>
    </div>
  </section>

  <!-- ③ 仕入原価マスタ -->
  <section class="settings-section">
    <button class="settings-section__head" type="button"
            aria-controls="sec-purchase-body" aria-expanded="true">
      <span class="settings-section__title">仕入原価マスタ
        <span id="purchase-count-badge" class="settings-count-badge" hidden></span>
      </span>
    </button>
    <div class="settings-section__body" id="sec-purchase-body">
      <div id="purchase-list-container"></div>
      <div id="purchase-add-row" class="settings-add-row">
        <input type="text" id="purchase-add-name" class="settings-input"
               placeholder="仕入科目名（例：食材費）" maxlength="30" autocomplete="off">
        <select id="purchase-add-tax" class="form-select" style="width:120px;flex-shrink:0;">
          <option value="10">10%</option>
          <option value="8">8%（軽減）</option>
          <option value="0">0%（非課税）</option>
        </select>
        <button id="purchase-add-btn" class="settings-add-btn" type="button">＋ 追加</button>
      </div>
      <p id="purchase-limit-hint" class="settings-note" hidden></p>
    </div>
  </section>

  <!-- ④ 販管費マスタ（コスト科目マスタ） -->
  <section class="settings-section">
    <button class="settings-section__head" type="button"
            aria-controls="sec-cm-body" aria-expanded="true">
      <span class="settings-section__title">販管費マスタ（コスト科目マスタ）</span>
    </button>
    <div class="settings-section__body" id="sec-cm-body">
      <div id="cost-master-container"></div>
      <button id="cost-master-save-btn" class="settings-save-btn" type="button">販管費マスタを保存</button>
    </div>
  </section>

  <!-- ⑤ 基本情報（読み取り専用） -->
  <section class="settings-section">
    <button class="settings-section__head" type="button"
            aria-controls="sec-info-body" aria-expanded="true">
      <span class="settings-section__title">基本情報</span>
    </button>
    <div class="settings-section__body" id="sec-info-body">
      <div class="info-row">
        <span class="info-row__key">店舗名</span>
        <span id="info-store-name" class="info-row__val">—</span>
      </div>
      <div class="info-row" id="info-business-hours-row" hidden>
        <span class="info-row__key">営業時間</span>
        <span id="info-business-hours" class="info-row__val">—</span>
      </div>
      <div class="info-row">
        <span class="info-row__key">プラン</span>
        <span class="info-row__val">レオ</span>
      </div>
      <div class="info-row">
        <span class="info-row__key">提供元</span>
        <span class="info-row__val">株式会社ターゲット</span>
      </div>
      <div class="info-row">
        <span class="info-row__key">バージョン</span>
        <span id="info-version" class="info-row__val" style="cursor:pointer;user-select:none;" title="サポート用情報">1.0.0</span>
      </div>

      <!-- GAS接続情報（既定非表示・バージョンを5回タップで展開） -->
      <div id="info-debug" hidden>
        <div class="info-row">
          <span class="info-row__key">GAS接続状態</span>
          <span id="gas-status-val" class="info-row__val" style="color:var(--uz-muted);">確認中...</span>
        </div>
        <div class="info-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
          <span class="info-row__key">WebアプリURL</span>
          <span id="gas-url-val" class="info-row__url" title="GAS WebアプリURL"></span>
        </div>
      </div>

      <p class="settings-note">
        店舗情報・営業時間は株式会社ターゲットが管理します。<br>
        変更が必要な場合はサポートにご連絡ください。
      </p>
    </div>
  </section>

  <div class="settings-footer">
    ウルトラZAIMUくん LEO版<br>
    © 2026 株式会社ターゲット<br>
    <span style="font-size:10px;">AI提案の自動確定は行いません。すべての操作はユーザーが確定してください。</span>
  </div>

</div><!-- /page-wrapper -->

<!-- ボトムナビゲーション（スマホ用） -->
<nav class="bottom-nav" aria-label="メインナビゲーション">

  <a href="index.html" class="nav-item">
    <i class="ti ti-planet nav-item__icon" aria-hidden="true"></i>
    <span class="nav-item__label">ホーム</span>
  </a>

  <a href="history.html" class="nav-item">
    <i class="ti ti-moon nav-item__icon" aria-hidden="true"></i>
    <span class="nav-item__label">月次管理</span>
  </a>

  <a href="settings.html" class="nav-item nav-item--active" aria-current="page">
    <i class="ti ti-settings nav-item__icon" aria-hidden="true"></i>
    <span class="nav-item__label">設定</span>
  </a>
</nav>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<script src="js/app.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
