<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>未収・買掛け — ウルトラZAIMUくん</title>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- iPad サイドバーナビ（スマホでは非表示） -->
<nav class="nav-sidebar" aria-label="メインナビゲーション">
  <div class="nav-sidebar__logo">ウルトラZAIMUくん</div>
  <a href="index.html" class="sidebar-item sidebar-item--active" aria-current="page">
    <span class="sidebar-item__icon" aria-hidden="true">🏠</span>
    <span>ホーム</span>
  </a>
  <a href="sales.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">💰</span>
    <span>売上入力</span>
  </a>
  <a href="cost.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">💳</span>
    <span>コスト入力</span>
  </a>
  <a href="history.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">📋</span>
    <span>履歴・修正</span>
  </a>
  <a href="settings.html" class="sidebar-item">
    <span class="sidebar-item__icon" aria-hidden="true">⚙️</span>
    <span>設定</span>
  </a>
</nav>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header" style="position:sticky;top:0;z-index:100;background:var(--uz-surface);border-bottom:1px solid var(--uz-border);display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">‹ 戻る</a>
    <span class="sub-header__title">未収・買掛け</span>
    <div style="width:60px;"></div>
  </header>

  <!-- 合計サマリーカード（全幅） -->
  <div class="uc-summary" role="region" aria-label="合計金額">
    <div class="uc-summary-card uc-summary-card--uncollected">
      <div class="uc-summary-card__label">未収合計</div>
      <div id="total-uncollected" class="uc-summary-card__value">¥—</div>
    </div>
    <div class="uc-summary-card uc-summary-card--payable">
      <div class="uc-summary-card__label">買掛合計</div>
      <div id="total-payable" class="uc-summary-card__value">¥—</div>
    </div>
  </div>

  <!-- iPad 2カラムラッパー / スマホは縦積み -->
  <div class="ipad-uc-wrap">

    <!-- 左カラム：未収 -->
    <div class="ipad-uc-left">
      <div class="uc-section-header">
        <span class="uc-section-header__title">未収（売上の未入金）</span>
        <span id="uncollected-badge"
              class="uc-section-header__badge uc-badge--uncollected"
              style="display:none;"
              aria-live="polite">0件</span>
      </div>
      <div id="uncollected-list"
           role="region"
           aria-label="未収一覧">
        <!-- uncollected.js が描画 -->
      </div>
    </div><!-- /ipad-uc-left -->

    <!-- 右カラム：買掛け -->
    <div class="ipad-uc-right">
      <div class="uc-section-header" style="margin-top:8px;">
        <span class="uc-section-header__title">買掛（コストの未払い）</span>
        <span id="payable-badge"
              class="uc-section-header__badge uc-badge--payable"
              style="display:none;"
              aria-live="polite">0件</span>
      </div>
      <div id="payable-list"
           role="region"
           aria-label="買掛一覧">
        <!-- uncollected.js が描画 -->
      </div>
    </div><!-- /ipad-uc-right -->

  </div><!-- /ipad-uc-wrap -->

  <!-- 下部余白 -->
  <div style="height:24px;"></div>

</div><!-- /page-wrapper -->

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/uncollected.js"></script>
</body>
</html>
