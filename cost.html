<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>コスト入力 — ウルトラZAIMUくん</title>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/sheet-modal.css">
  <link rel="stylesheet" href="css/cost-modal.css">
  <link rel="stylesheet" href="css/ipad-input.css">
  <link rel="stylesheet" href="css/uz-input.css">
</head>
<body data-page="cost">

<!-- iPad サイドバーナビ（スマホでは非表示／中身は app.js uzRenderSidebar が生成） -->
<nav class="nav-sidebar" id="nav-sidebar" data-active="monthly" aria-label="メインナビゲーション"></nav>

<div class="page-wrapper">

  <!-- サブページヘッダー -->
  <header class="sub-header">
    <a href="index.html" class="sub-header__back" aria-label="ホームに戻る">
      ‹ 戻る
    </a>
    <span class="sub-header__title">コスト入力</span>
    <div style="width:60px;"></div><!-- バランス用 -->
  </header>

  <!-- iPad コスト入力パネル（iPad のみ表示） -->
  <div class="ipad-sc-wrap" id="ipad-sc-wrap">

    <!-- 左カラム：サマリー + フィルタ + 一覧 -->
    <div class="ipad-sc-left">
      <div class="ipad-summary-cards">
        <div class="ipad-summary-card">
          <div class="ipad-summary-card__label">当月コスト合計</div>
          <div class="ipad-summary-card__value" id="ipad-month-total">---</div>
        </div>
        <div class="ipad-summary-card ipad-summary-card--amber">
          <div class="ipad-summary-card__label">未払</div>
          <div class="ipad-summary-card__value" id="ipad-unpaid-count">---件</div>
        </div>
        <div class="ipad-summary-card">
          <div class="ipad-summary-card__label">今月の入力件数</div>
          <div class="ipad-summary-card__value" id="ipad-entry-count">---件</div>
        </div>
      </div>
      <div class="ipad-filter-bar">
        <select id="ipad-filter-month" class="ipad-filter-select" aria-label="表示月"></select>
        <select id="ipad-filter-state" class="ipad-filter-select" aria-label="状態">
          <option value="all">すべて</option>
          <option value="unpaid">未払のみ</option>
          <option value="locked">ロックのみ</option>
        </select>
      </div>
      <div class="ipad-list-body" id="ipad-cost-list">
        <div class="ipad-list-empty">読み込み中...</div>
      </div>
    </div><!-- /ipad-sc-left -->

    <!-- 右カラム：タブ + フォーム -->
    <div class="ipad-sc-right">
      <div class="ipad-input-tabs">
        <button class="ipad-tab ipad-tab--active" data-tab="add" type="button">コストを追加</button>
        <button class="ipad-tab" data-tab="payable" type="button">買掛け一覧</button>
      </div>
      <div id="ipad-tab-add" class="ipad-tab-content">
        <!-- form-bodyをJSで移動 -->
      </div>
      <div id="ipad-tab-payable" class="ipad-tab-content" style="display:none">
        <div class="ipad-unpaid-list" id="ipad-payable-list">
          <div class="ipad-list-empty">読み込み中...</div>
        </div>
      </div>
    </div><!-- /ipad-sc-right -->

  </div><!-- /ipad-sc-wrap -->

</div><!-- /page-wrapper -->

<!-- 登録ボタン（固定） -->
<div class="submit-bar">
  <button id="submit-btn" class="submit-btn submit-btn--red" type="button">
    登録する
  </button>
</div>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay" class="loading-overlay" aria-hidden="true">
  <div class="spinner"></div>
</div>

<!-- AIフック（フェーズ3用・削除禁止） -->
<div id="receipt-capture-area" style="display:none"></div>
<div id="csv-import-area"      style="display:none"></div>
<div id="ai-suggestion-area"   style="display:none"></div>

<script src="js/app.js"></script>
<script src="js/cost.js"></script>
<script src="js/uz-input.js"></script>
</body>
</html>
